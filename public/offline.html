<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - PSP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
      padding: 40px 32px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      font-weight: 500;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    button {
      width: 100%;
      background: #10b981;
      color: #fff;
      font-weight: 700;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #059669; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No pudimos conectar con el servidor. Revisá tu conexión a internet e intentá de nuevo.</p>
    <button onclick="window.location.reload()">🔄 Reintentar</button>
  </div>
</body>
</html>
